<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Honey Tracker 🍯</title>

  <link rel="stylesheet" href="hi.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">
  <h1>🍯 Honey Business Tracker</h1>

  <!-- ADD BATCH -->
  <div class="card">
    <h2>Add New Stock</h2>
    <input type="number" id="bottles" placeholder="Number of bottles (e.g. 11)">
    <input type="number" id="size" placeholder="Size per bottle (e.g. 3L)">
    <button onclick="addBatch()">Add Batch</button>
  </div>

  <!-- BATCHES -->
  <div id="batchesContainer"></div>

</div>

<script src="two.js"></script>
</body>
</html>
