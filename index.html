<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Honey Tracker 🍯</title>

  <link rel="stylesheet" href="hi.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">
  <h1>🍯 Honey Business Tracker</h1>

  <div class="card">
    <h2>Add Stock</h2>

    <input type="number" id="bottles" placeholder="Stock quantity (e.g. 10)">
    <input type="number" id="size" placeholder="Litres per bottle (e.g. 3)">

    <button onclick="addBatch()">Add Stock</button>
  </div>

  <div id="batchesContainer"></div>
</div>

<script src="two.js"></script>

</body>
</html>
